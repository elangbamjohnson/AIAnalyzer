# CI: build and test the Swift package on each push and pull request.
name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'tools/AIAnalyzer/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'tools/AIAnalyzer/**'

jobs:
  build-test:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ${{ env.HOME }}/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

      - name: Smoke — run analyzer on fixture (AI off)
        env:
          AI_ENABLED: "false"
        run: |
          FIXTURE="${{ github.workspace }}/Fixtures/SmokeSample.swift"
          test -f "$FIXTURE" || { echo "Missing fixture (did you commit Fixtures/SmokeSample.swift?): $FIXTURE"; exit 1; }
          swift run AIAnalyzer "$FIXTURE"
